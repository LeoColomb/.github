# yamllint disable rule:document-start
# https://docs.github.com/actions

name: Deploy

on:
  workflow_call:
    secrets:
      FLY_API_TOKEN:
        required: true
        description: Fly.io API Token

permissions:
  contents: read

jobs:
  fly:
    name: Fly.io
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Use flyctl
        uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # 1.3

      - name: Deploy
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
