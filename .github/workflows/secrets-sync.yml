# yamllint disable rule:document-start
# https://docs.github.com/actions

name: Secret Manager

on:
  workflow_call:
    inputs:
      name:
        required: true
        type: string
        description: Name of the secret to sync
      id:
        required: true
        type: string
        description: ID of the secret to sync
    secrets:
      BITWARDEN_ACCESS_TOKEN:
        required: true
        description: Bitwarden Access Token
      FLY_API_TOKEN:
        required: true
        description: Fly.io API Token

permissions:
  contents: none

jobs:
  bitwarden:
    name: Bitwarden
    runs-on: ubuntu-latest
    steps:
      - name: Get Secrets
        uses: bitwarden/sm-action@v2.2.0
        with:
          cloud_region: eu
          access_token: ${{ secrets.BITWARDEN_ACCESS_TOKEN }}
          secrets: ${{ inputs.id }} > ${{ inputs.name }}

      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Use flyctl
        uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # 1.3

      - name: Deploy
        run: flyctl secrets set --stage "${{ inputs.name }}=$${{ inputs.name }}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
